<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Yaser Ibrahim Logo</title>
  <desc id="desc">A clean futuristic monogram logo with the initials YI in cyan inside a rounded square.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="18" y1="14" x2="110" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13243A"/>
      <stop offset="1" stop-color="#0A1024"/>
    </linearGradient>

    <linearGradient id="strokeGradient" x1="22" y1="18" x2="106" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="38" y1="36" x2="90" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A5F3FC"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.27
                0 0 0 0 0.86
                0 0 0 0 1
                0 0 0 0.45 0"
        result="glow"
      />
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="128" height="128" rx="32" fill="#070D1F"/>

  <rect
    x="18"
    y="18"
    width="92"
    height="92"
    rx="24"
    fill="url(#bgGradient)"
    stroke="url(#strokeGradient)"
    stroke-width="3"
    filter="url(#softGlow)"
  />

  <path
    d="M34 32H94"
    stroke="#67E8F9"
    stroke-opacity="0.16"
    stroke-width="2"
    stroke-linecap="round"
  />

  <path
    d="M34 96H94"
    stroke="#8B5CF6"
    stroke-opacity="0.18"
    stroke-width="2"
    stroke-linecap="round"
  />

  <text
    x="64"
    y="74"
    text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="34"
    font-weight="800"
    letter-spacing="3"
    fill="url(#textGradient)"
  >
    YI
  </text>

  <circle cx="99" cy="29" r="8" fill="#67E8F9" filter="url(#dotGlow)"/>
  <circle cx="91" cy="91" r="4.5" fill="#7C3AED" opacity="0.9" filter="url(#dotGlow)"/>
</svg>